<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global News Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/css.css">
</head>
<body>

    <header class="site-banner">
        <h1>Daily Digital News</h1>
    </header>

    <section class="registration-section">
        <h3 class="registration-header">Create a New Account</h3>
        <form class="registration-form" action="#" method="POST">
            
            <div class="form-group">
                <label for="reg-username">Username:</label>
                <input type="text" id="reg-username" name="username" required>
            </div>

            <div class="form-group">
                <label for="reg-dni">DNI (Format: 12345678X):</label>
                <input type="text" id="reg-dni" name="dni" 
                       pattern="[0-9]{8}[A-Z]" 
                       title="8 digits followed by an uppercase letter"
                       placeholder="12345678X" required>
            </div>

            <div class="form-group">
                <label for="reg-password">Password:</label>
                <input type="password" id="reg-password" name="password" required>
            </div>
            
            <button type="submit" class="reg-submit-button">Register</button>
        </form>
    </section>

</body>
</html>
