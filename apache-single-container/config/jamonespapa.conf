<VirtualHost *:8090>
 ServerAdmin webmaster@jamonespepe.es
 ServerName jamonespepe.es
 ServerAlias www.jamonespepe.es
 DocumentRoot /var/www/html/jamonespepe
 ErrorLog /var/log/apache2/jamones-error.log
 CustomLog /var/log/apache2/jamones-access.log combined
 <Directory /var/www/html/jamonespepe>
 Options -Indexes +FollowSymLinks
 AllowOverride All
 Require all granted
 </Directory>
 # --- Configuración para el Área de Clientes Restringida ---
 # El archivo .htpasswd se copiará al contenedor en /etc/apache2/.htpasswd_jamonespepe
 <Directory /var/www/html/jamonespepe/clientes>
  AuthType Basic
  AuthName "Acceso Restringido - Clientes Jamones Pepe"
  AuthUserFile /etc/apache2/.htpasswd_jamonespepe
  Require valid-user
 </Directory>
</VirtualHost>