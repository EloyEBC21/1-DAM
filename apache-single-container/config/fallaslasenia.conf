<VirtualHost *:80>
 ServerAdmin webmaster@fallalasenia.org
 ServerName fallalasenia.org
 ServerAlias www.fallalasenia.org
 DocumentRoot /var/www/html/fallaslasenia
 ErrorLog /var/log/apache2/senia-error.log
 CustomLog /var/log/apache2/senia-access.log combined
 <Directory /var/www/html/fallaslasenia>
  Options -Indexes +FollowSymLinks
  AllowOverride All
  Require all granted
 </Directory>
</VirtualHost>