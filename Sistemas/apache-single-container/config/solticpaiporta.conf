<VirtualHost *:8085>
 ServerAdmin webmaster@solticpaiporta.org               # Declara quien será el adm de la instancia
 ServerName solticpaiporta.org                          # Nombre de la instancia
 ServerAlias www.solticpaiporta.org                     # Nombre de la pagina web
 DocumentRoot /var/www/html/solticpaiporta              # Donde ira el documento root
 Alias /visitas/ "/var/www/stats/"                      # Es un "sub-dominio" para entrar en "/var/www/stats/"
 ErrorLog /var/log/apache2/senia-error.log              # Donde envia el error log
 CustomLog /var/log/apache2/senia-access.log combined   # lo mismo que "ErrorLog?
 <Directory /var/www/stats>
  Options Indexes FollowSymLinks # Permitimos Indexes para que Webalizer muestre los archivos HTML
  AllowOverride None             # Permite que todo el mundo pueda acceder
  Require all granted            # "Cualquier persona que llegue desde cualquier lugar (internet, tu red local o tu propio PC) tiene permiso para ver los archivos que hay en esta carpeta"
 </Directory>
</VirtualHost>  